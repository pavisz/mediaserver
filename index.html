<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Overdrive | Archive Manager</title>
</head>
<body class="bg-gray-100 h-screen flex flex-col">
    <nav class="bg-white border-b px-8 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-gray-800">OVERDRIVE ◈ STORAGE</h1>
        <div class="flex gap-4">
            <button onclick="sync()" class="text-sm bg-gray-200 px-4 py-2 rounded-lg hover:bg-gray-300">Sync Channel</button>
        </div>
    </nav>

    <main class="flex-1 p-8 max-w-6xl mx-auto w-full">
        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr><th class="p-4">Filename</th><th class="p-4">Actions</th></tr>
                </thead>
                <tbody id="file-list"></tbody>
            </table>
        </div>
    </main>

    <script>
        const BACKEND = "https://pavisz-mediaserver-backend.hf.space";

        async function sync() {
            await fetch(`${BACKEND}/api/sync`);
            load();
        }

        async function load() {
            const res = await fetch(`${BACKEND}/api/files`);
            const data = await res.json();
            document.getElementById('file-list').innerHTML = data.map(f => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-mono text-sm">${f.name}</td>
                    <td class="p-4">
                        <a href="${BACKEND}/api/stream/${f.id}" class="text-blue-600 mr-4">Download</a>
                        <button onclick="del('${f.id}')" class="text-red-500">Delete</button>
                    </td>
                </tr>
            `).join('');
        }
        
        async function del(id) { await fetch(`${BACKEND}/api/delete/${id}`, {method: 'DELETE'}); load(); }
        load();
    </script>
</body>
</html>
