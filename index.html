<!DOCTYPE html>
<html class="dark">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6">
    <div class="max-w-3xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold text-blue-400">Overdrive Cloud</h1>
            <button onclick="document.documentElement.classList.toggle('dark')" class="text-xs bg-gray-700 px-3 py-1 rounded">Toggle Dark Mode</button>
        </div>

        <div id="drop-zone" class="border-2 border-dashed border-gray-600 rounded-xl p-8 text-center cursor-pointer hover:border-blue-500 mb-6 transition">
            Drag & Drop Files or Click to Upload
            <input type="file" id="fileIn" class="hidden" onchange="upload(this.files[0])">
        </div>

        <div id="progress" class="hidden mb-6 bg-gray-700 h-2 rounded-full"><div id="bar" class="bg-blue-500 h-2 rounded-full w-0"></div></div>

        <table class="w-full bg-gray-800 rounded-lg overflow-hidden">
            <tbody id="list"></tbody>
        </table>
    </div>

    <script>
        document.getElementById('drop-zone').onclick = () => document.getElementById('fileIn').click();
        
        async function upload(f) {
            document.getElementById('progress').classList.remove('hidden');
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload');
            xhr.upload.onprogress = (e) => document.getElementById('bar').style.width = (e.loaded/e.total)*100 + '%';
            xhr.onload = () => { document.getElementById('progress').classList.add('hidden'); load(); };
            const fd = new FormData(); fd.append('file', f);
            xhr.send(fd);
        }

        async function load() {
            const r = await fetch('/api/files');
            const d = await r.json();
            document.getElementById('list').innerHTML = d.map(f => `
                <tr class="border-b border-gray-700">
                    <td class="p-3"><a href="/api/stream/${f.id}" target="_blank" class="text-blue-400">${f.name}</a></td>
                    <td class="p-3 text-right"><button onclick="del('${f.id}')" class="text-red-400">Delete</button></td>
                </tr>
            `).join('');
        }
        async function del(id) { await fetch(`/api/delete/${id}`, {method: 'DELETE'}); load(); }
        load();
    </script>
</body>
</html>
