<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen text-gray-900 dark:text-gray-100 transition-colors">
    <nav class="bg-white dark:bg-gray-800 border-b dark:border-gray-700 px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-blue-600">◈ OVERDRIVE</h1>
        <div class="flex items-center gap-4">
            <span id="status-badge" class="text-xs font-mono bg-green-100 dark:bg-green-900 text-green-700 px-3 py-1 rounded-full">SYSTEM: LOADING...</span>
            <button onclick="toggleDarkMode()" class="bg-gray-200 dark:bg-gray-700 px-3 py-1 rounded-lg text-xs">Theme</button>
            <button onclick="syncFiles()" id="sync-btn" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-blue-700">Sync Archive</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-8">
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-2xl p-10 text-center mb-8 bg-white dark:bg-gray-800 hover:border-blue-500 transition cursor-pointer">
            <p class="text-gray-500 dark:text-gray-400">Drag & Drop files here</p>
            <input type="file" id="fileIn" class="hidden" onchange="upload(this.files[0])">
        </div>

        <div id="progress-container" class="hidden mb-6">
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full" style="width: 0%"></div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 dark:bg-gray-900 text-gray-500 uppercase text-xs">
                    <tr><th class="p-4">Filename</th><th class="p-4 text-right">Actions</th></tr>
                </thead>
                <tbody id="file-list" class="divide-y divide-gray-100 dark:divide-gray-700"></tbody>
            </table>
        </div>
    </main>

    <script>
        function toggleDarkMode() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('darkMode', isDark);
        }
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');

        const dz = document.getElementById('drop-zone');
        dz.onclick = () => document.getElementById('fileIn').click();
        dz.ondragover = (e) => { e.preventDefault(); dz.classList.add('border-blue-500'); };
        dz.ondragleave = () => dz.classList.remove('border-blue-500');
        dz.ondrop = (e) => { e.preventDefault(); dz.classList.remove('border-blue-500'); upload(e.dataTransfer.files[0]); };

        async function upload(file) {
            const bar = document.getElementById('progress-bar');
            document.getElementById('progress-container').classList.remove('hidden');
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload');
            xhr.upload.onprogress = (e) => { bar.style.width = (e.loaded / e.total) * 100 + '%'; };
            xhr.onload = () => { loadFiles(); document.getElementById('progress-container').classList.add('hidden'); };
            const fd = new FormData(); fd.append('file', file);
            xhr.send(fd);
        }

        async function del(id) {
            if(!confirm("Are you sure you want to delete this file from the index?")) return;
            await fetch(`/api/delete/${id}`, {method: 'DELETE'});
            loadFiles();
        }

        async function loadFiles() {
            const res = await fetch('/api/files');
            const data = await res.json();
            document.getElementById('file-list').innerHTML = data.map(f => `
                <tr class="hover:bg-gray-50 dark:hover:bg-gray-700 transition">
                    <td class="p-4 font-mono"><a href="/api/stream/${f.id}" target="_blank" class="text-blue-500 hover:underline">${f.name}</a></td>
                    <td class="p-4 text-right"><button onclick="del('${f.id}')" class="text-red-400 hover:text-red-600">Delete</button></td>
                </tr>
            `).join('');
        }

        setInterval(async () => {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('status-badge').innerText = `SYSTEM: ${data.status} | UPTIME: ${data.uptime_seconds}s`;
        }, 5000);

        loadFiles();
    </script>
</body>
</html>
