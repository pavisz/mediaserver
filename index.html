<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-blue-600">◈ OVERDRIVE</h1>
        <div class="flex items-center gap-6">
            <div id="status-badge" class="text-xs font-mono bg-green-100 text-green-700 px-3 py-1 rounded-full">SYSTEM: CHECKING...</div>
            <button onclick="syncFiles()" id="sync-btn" class="text-sm bg-gray-100 px-4 py-2 rounded-lg">Sync Archive</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-8">
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-2xl p-8 text-center mb-8 bg-white cursor-pointer hover:border-blue-500">
            <p class="text-gray-500">Drag & Drop .7z files here</p>
            <input type="file" id="fileIn" class="hidden" onchange="upload(this.files[0])">
        </div>
        <table class="w-full bg-white rounded-xl shadow-sm border border-gray-200">
            <tbody id="file-list"></tbody>
        </table>
    </main>

    <script>
        async function updateStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('status-badge').innerText = `SYSTEM: ${data.status} | UPTIME: ${data.uptime_seconds}s`;
        }
        
        async function syncFiles() {
            document.getElementById('sync-btn').innerText = "Syncing...";
            await fetch('/api/sync');
            document.getElementById('sync-btn').innerText = "Sync Archive";
            loadFiles();
        }

        async function loadFiles() {
            const res = await fetch('/api/files');
            const data = await res.json();
            document.getElementById('file-list').innerHTML = data.map(f => `
                <tr class="border-b"><td class="p-4">${f.name}</td><td class="p-4 text-right"><a href="/api/stream/${f.id}" class="text-blue-600">Download</a></td></tr>
            `).join('');
        }

        setInterval(updateStatus, 5000);
        updateStatus();
        loadFiles();
    </script>
</body>
</html>
