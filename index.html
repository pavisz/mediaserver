<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Overdrive | Cloud Manager</title>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b px-8 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold text-blue-600">◈ OVERDRIVE</h1>
        <button onclick="syncFiles()" id="sync-btn" class="text-sm bg-gray-100 px-4 py-2 rounded-lg hover:bg-gray-200">Sync Channel</button>
    </nav>

    <main class="max-w-5xl mx-auto p-8">
        <div id="drop-zone" class="border-2 border-dashed border-gray-300 rounded-2xl p-10 text-center mb-8 bg-white hover:border-blue-500 transition cursor-pointer">
            <p class="text-gray-500 font-medium">Drag & Drop .7z files here</p>
            <input type="file" id="fileIn" class="hidden" onchange="upload(this.files[0])">
        </div>

        <div id="progress-container" class="hidden mb-6">
            <div class="w-full bg-gray-200 rounded-full h-2.5"><div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div></div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
            <table class="w-full text-left text-sm">
                <thead class="bg-gray-50 text-gray-500 uppercase text-xs">
                    <tr><th class="p-4">Filename</th><th class="p-4 text-right">Actions</th></tr>
                </thead>
                <tbody id="file-list" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </main>

    <script>
        const BACKEND = "https://pavisz-mediaserver-backend.hf.space";

        async function syncFiles() {
            const btn = document.getElementById('sync-btn');
            btn.innerText = "Syncing...";
            await fetch(`${BACKEND}/api/sync`);
            btn.innerText = "Sync Channel";
            loadFiles();
        }

        async function upload(file) {
            const bar = document.getElementById('progress-bar');
            document.getElementById('progress-container').classList.remove('hidden');
            const xhr = new XMLHttpRequest();
            xhr.open('POST', `${BACKEND}/api/upload`);
            xhr.upload.onprogress = (e) => { bar.style.width = (e.loaded / e.total) * 100 + '%'; };
            xhr.onload = () => { loadFiles(); document.getElementById('progress-container').classList.add('hidden'); };
            const fd = new FormData(); fd.append('file', file);
            xhr.send(fd);
        }

        async function del(id) {
            if(!confirm("Remove file from list?")) return;
            await fetch(`${BACKEND}/api/delete/${id}`, {method: 'DELETE'});
            loadFiles();
        }

        async function loadFiles() {
            const res = await fetch(`${BACKEND}/api/files`);
            const data = await res.json();
            document.getElementById('file-list').innerHTML = data.map(f => `
                <tr class="hover:bg-blue-50">
                    <td class="p-4 font-mono text-gray-700">${f.name}</td>
                    <td class="p-4 text-right">
                        <a href="${BACKEND}/api/stream/${f.id}" target="_blank" class="text-blue-600 font-bold px-3">Download</a>
                        <button onclick="del('${f.id}')" class="text-red-400 hover:text-red-600">Delete</button>
                    </td>
                </tr>
            `).join('');
        }
        loadFiles();
    </script>
</body>
</html>
