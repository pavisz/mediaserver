<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = {darkMode: 'class'}</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors">
    <nav class="bg-white dark:bg-gray-800 p-6 shadow-sm flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">◈ OVERDRIVE</h1>
        <div id="status-badge" class="text-xs font-mono text-green-500">SYSTEM: LOADING...</div>
    </nav>

    <main class="max-w-4xl mx-auto p-6">
        <div id="drop-zone" class="border-4 border-dashed border-gray-300 dark:border-gray-700 rounded-3xl p-12 text-center cursor-pointer hover:border-blue-500 transition">
            <p class="text-gray-500">Click or Drag & Drop file here</p>
            <input type="file" id="fileIn" class="hidden" onchange="handleUpload(this.files[0])">
        </div>

        <div id="progress-wrapper" class="hidden mt-8">
            <div class="flex justify-between text-xs mb-2 dark:text-white">
                <span id="progress-text">Uploading...</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="w-full bg-gray-200 h-2 rounded-full"><div id="progress-bar" class="bg-blue-600 h-2 rounded-full w-0 transition-all duration-300"></div></div>
        </div>

        <table class="w-full mt-10 bg-white dark:bg-gray-800 rounded-xl overflow-hidden">
            <tbody id="file-list"></tbody>
        </table>
    </main>

    <script>
        async function handleUpload(file) {
            const wrapper = document.getElementById('progress-wrapper');
            const bar = document.getElementById('progress-bar');
            const percent = document.getElementById('progress-percent');
            wrapper.classList.remove('hidden');

            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload');
            xhr.upload.onprogress = (e) => {
                const p = Math.round((e.loaded / e.total) * 100);
                bar.style.width = p + '%';
                percent.innerText = p + '%';
            };
            xhr.onload = () => { wrapper.classList.add('hidden'); alert('Uploaded!'); loadFiles(); };
            const fd = new FormData(); fd.append('file', file);
            xhr.send(fd);
        }

        async function loadFiles() {
            const res = await fetch('/api/files');
            const data = await res.json();
            document.getElementById('file-list').innerHTML = data.map(f => `
                <tr class="border-b dark:border-gray-700">
                    <td class="p-4 text-sm dark:text-white"><a href="/api/stream/${f.id}" target="_blank">${f.name}</a></td>
                    <td class="p-4 text-right"><button onclick="del('${f.id}')" class="text-red-500 text-xs">Delete</button></td>
                </tr>
            `).join('');
        }
        
        setInterval(async () => {
            const res = await fetch('/api/status');
            const data = await res.json();
            document.getElementById('status-badge').innerText = `SYSTEM: ${data.status} | UPTIME: ${data.uptime}s`;
        }, 3000);
        
        loadFiles();
    </script>
</body>
</html>
